name: Update Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package name from packages/manifest.yml
        required: true
        type: string
      version:
        description: Release version, with or without v prefix. Defaults to latest published release.
        required: false
        default: latest
        type: string
  repository_dispatch:
    types: [homebrew-package-release]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: update-package-${{ inputs.package || github.event.client_payload.package }}-${{ inputs.version || github.event.client_payload.version || 'latest' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve input
        id: input
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "package=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version || 'latest' }}" >> "$GITHUB_OUTPUT"
          else
            echo "package=${{ github.event.client_payload.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate manifest
        run: ruby scripts/validate-manifest.rb

      - name: Update package file
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ruby scripts/update-package.rb \
            --package "${{ steps.input.outputs.package }}" \
            --version "${{ steps.input.outputs.version }}" \
            --summary-file .update-package-summary.md

      - name: Ensure auto-merge label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'auto-merge/package-update';
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: '0E8A16',
                  description: 'Eligible for automatic package-update squash merge'
                });
              } catch (createError) {
                if (createError.status !== 422) {
                  throw createError;
                }
              }
            }

      - name: Create or update pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: ${{ steps.update.outputs.branch }}
          delete-branch: true
          commit-message: ${{ steps.update.outputs.title }}
          title: ${{ steps.update.outputs.title }}
          body-path: .update-package-summary.md
          labels: auto-merge/package-update
          add-paths: ${{ steps.update.outputs.file_path }}

      - name: Queue PR review
        if: ${{ steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'pr-review.yml',
              ref: '${{ steps.cpr.outputs.pull-request-branch }}',
              inputs: {
                pull_request_number: '${{ steps.cpr.outputs.pull-request-number }}'
              }
            });
