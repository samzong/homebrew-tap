  mote:
    type: cask
    source_repo: samzong/mote
    path: Casks/mote.rb
    version_prefix: v
    auto_bump_on_scan: true
    assets:
      arm64:
        filename: Mote-arm64.dmg
        block: on_arm

  prompts:
    type: cask
    source_repo: samzong/prompts
    path: Casks/prompts.rb
    version_prefix: v
    auto_bump_on_scan: true
    assets:
      arm64:
        filename: Prompts_{version}_aarch64.dmg
        block: on_arm
      x86_64:
        filename: Prompts_{version}_x64.dmg
        block: on_intel

  saveeye:
    type: cask
    source_repo: samzong/SaveEye
    path: Casks/saveeye.rb
    version_prefix: v
    auto_bump_on_scan: true
    assets:
      arm64:
        filename: SaveEye-{version}-arm64.dmg
        block: on_arm

  gmc:
    type: formula
    source_repo: samzong/gmc
    path: Formula/gmc.rb
    version_prefix: v
    auto_bump_on_scan: true
    assets:
      darwin_arm64:
        filename: gmc_Darwin_arm64.tar.gz
        url_match: gmc_Darwin_arm64.tar.gz
      darwin_x86_64:
