      x86_64:
        filename: LogoWallpaper-x86_64.dmg
        block: on_intel

  mac-music-player:
    type: cask
    source_repo: samzong/MacMusicPlayer
    path: Casks/mac-music-player.rb
    version_prefix: v
    auto_bump_on_scan: true
    assets:
      arm64:
        filename: MacMusicPlayer-arm64.dmg
        block: on_arm
      x86_64:
